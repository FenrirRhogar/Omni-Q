name: Build AxisEQ

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Configure CMake
      run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

    - name: Build Plugin
      run: cmake --build build --config Release --parallel 4

    - name: Zip Artifacts
      run: |
        Compress-Archive -Path "build/AxisEQ_artefacts/Release/VST3/AxisEQ.vst3" -DestinationPath "AxisEQ_Windows_VST3.zip"
        Compress-Archive -Path "build/AxisEQ_artefacts/Release/Standalone/AxisEQ.exe" -DestinationPath "AxisEQ_Windows_Standalone.zip"

    - name: Upload Windows VST3
      uses: actions/upload-artifact@v3
      with:
        name: AxisEQ-Windows-VST3
        path: AxisEQ_Windows_VST3.zip

    - name: Upload Windows Standalone
      uses: actions/upload-artifact@v3
      with:
        name: AxisEQ-Windows-Standalone
        path: AxisEQ_Windows_Standalone.zip

  build-macos:
    name: macOS Build
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Configure CMake
      run: cmake -B build -G Xcode -DCMAKE_BUILD_TYPE=Release

    - name: Build Plugin
      run: cmake --build build --config Release --parallel 4

    - name: Zip Artifacts
      run: |
        cd build/AxisEQ_artefacts/Release
        zip -r ../../../AxisEQ_Mac_VST3.zip VST3/AxisEQ.vst3
        zip -r ../../../AxisEQ_Mac_AU.zip AU/AxisEQ.component

    - name: Upload Mac VST3
      uses: actions/upload-artifact@v3
      with:
        name: AxisEQ-Mac-VST3
        path: AxisEQ_Mac_VST3.zip

    - name: Upload Mac AU
      uses: actions/upload-artifact@v3
      with:
        name: AxisEQ-Mac-AU
        path: AxisEQ_Mac_AU.zip
